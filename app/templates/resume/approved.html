<div class="text-center space-y-4 py-4">
  <div class="text-green-600 text-4xl">✓</div>
  <h2 class="text-lg font-semibold">Resume Approved!</h2>
  <p class="text-sm text-gray-600">
    Tailored resume for <strong>{{ job.title }}</strong> at <strong>{{ job.company }}</strong> has been saved.
  </p>
  <div class="flex justify-center gap-3 pt-2">
    <a href="/resume/download/{{ job.id }}"
       class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg transition">
      Download PDF
    </a>
    <button onclick="closeModal()"
      class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2">Close</button>
  </div>
</div>
