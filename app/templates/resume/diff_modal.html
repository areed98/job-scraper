<div class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-lg font-semibold">Tailored Resume</h2>
      <p class="text-sm text-gray-500">{{ job.title }} · {{ job.company }}</p>
    </div>
    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
  </div>

  {% if tr.diff_html %}
  <div class="overflow-x-auto rounded-lg border border-gray-200 bg-gray-50 p-2 text-xs">
    {{ tr.diff_html | safe }}
  </div>
  {% else %}
  <p class="text-sm text-gray-500">No changes were suggested for this job.</p>
  {% endif %}

  <div class="flex justify-end gap-3 pt-2">
    <button onclick="closeModal()"
      class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2">Cancel</button>

    {% if not tr.approved %}
    <form hx-post="/resume/approve/{{ job.id }}"
          hx-target="#modal-content"
          hx-swap="innerHTML">
      <button type="submit"
        class="text-sm bg-green-600 hover:bg-green-700 text-white font-medium px-5 py-2 rounded-lg transition">
        Approve &amp; Generate PDF
      </button>
    </form>
    {% else %}
    <a href="/resume/download/{{ job.id }}"
       class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-lg transition">
      Download PDF
    </a>
    {% endif %}
  </div>
</div>
