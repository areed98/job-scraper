{% extends "base.html" %}
{% block title %}Upload Resume — JobScraper{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-6">Upload Resume</h1>

  {% if error %}
  <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-100 text-red-700">{{ error }}</div>
  {% endif %}

  <form method="POST" enctype="multipart/form-data"
        class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Resume (PDF only)</label>
      <input type="file" name="resume" accept=".pdf" required
             class="block w-full text-sm text-gray-600 border border-gray-300 rounded-lg px-3 py-2
                    file:mr-4 file:py-1.5 file:px-3 file:rounded file:border-0
                    file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700
                    hover:file:bg-indigo-100">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition">
      Upload &amp; Extract
    </button>
  </form>
</div>
{% endblock %}
